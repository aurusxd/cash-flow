<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Обновление записи ДДС</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.8/dist/lux/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    
{% block content %}

<div class="container py-4">
    <div class="card shadow-sm">
        <div class="card-header bg-dark text-white">
            <h1 class="h4 mb-0">
                {% if object %}
                    Редактирование записи ДДС
                {% else %}
                    Создание записи ДДС
                {% endif %}
            </h1>
        </div>

        <div class="card-body">
            <form method="post" novalidate>
                {% csrf_token %}

                {% for field in form %}
                    <div class="mb-3">
                        <label
                            for="{{ field.id_for_label }}"
                            class="form-label"
                        >
                            {{ field.label }}
                        </label>

                        {{ field }}

                        {% if field.errors %}
                            <div class="text-danger small mt-1">
                                {{ field.errors|striptags }}
                            </div>
                        {% endif %}
                    </div>
                {% endfor %}

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">
                        Сохранить
                    </button>

                    <a href="{% url 'record_list' %}" class="btn btn-outline-secondary">
                        Отмена
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>

{% endblock content %}
</body>
</html>
